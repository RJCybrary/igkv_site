<app-loder *ngIf="loding"></app-loder>
<app-banner [banner_heading]="bannerHeading" [banner_img]="bannerImg"></app-banner>
<section id="Section1" class="pt-3 pb-3" aria-labelledby="publication-heading ii">
    <div class="container">
        <div class="row">
            <div class="col-lg-12">
                <div>
                    <h2 class="section-title1">Latest</h2>
                </div> <!-- section title -->
                <div class="about-cont" *ngIf="this.publicationList_Data?.length > 0 ; else elseblock">
                    <div class="row ">
                        <div class="col-lg-3 col-md-6 col-sm-8 col-10 mb-5" *ngFor="let item of publicationList_Data">
                            <div class="singel-publication">
                                <div class="image">
                                    <!-- <img src="https://igkv.ac.in/{{item.Image_URL}}" (error)="OnErrorImage($event)" alt="Publication image" height="320px"> -->
                                    <img [src]="'https://igkv.ac.in/' + item.Image_URL" (error)="OnErrorImage($event)"
                                        [alt]="'Cover image of publication titled ' + item.Publication_Title + ' by ' + item.Author_Name"
                                        height="320">
                                </div>
                                <div class="details">
                                    <div style="height: 7em;">
                                        <span class="info">
                                            <div class="author-name">
                                                <p> <span>Author Name</span>: <strong>{{item.Author_Name}}</strong></p>
                                            </div>
                                            <div class="p-date">
                                                <p> <span>Publication Date</span>: <strong>{{item.Publication_Date}}
                                                    </strong></p>
                                            </div>
                                            <div class="p-title">
                                                <p> <span>Publication Title</span>: <strong>{{item.Publication_Title}}
                                                    </strong></p>
                                            </div>

                                            <!-- <p> <span>Co Author Name</span>: <strong>{{item.Co_Auther_Name}}</strong></p> -->
                                            <!-- <p> <span>Publisher_Name</span>: <strong>{{item.Publisher_Name}} </strong></p> -->

                                            <!-- <p> <span>Publication_Date</span>: <strong>{{item.Publication_Date}}</strong></p> -->
                                            <!-- <p class="text-center new" ><a [href]="item.File_URL" target="_blank" class="text-center" style="cursor: pointer;"> View</a> </p> -->
                                        </span>
                                    </div>

                                    <div class="view-more">
                                        <!-- <a href="https://igkv.ac.in/{{item.File_URL}}" target="_blank">Read More <i
                                                class="fa-solid fa-arrow-right color-orange"></i></a> -->
                                        <a [href]="'https://igkv.ac.in/' + item.File_URL" target="_blank"
                                            rel="noopener noreferrer"
                                            [attr.aria-label]="'Read more about ' + item?.Publication_Title + ' by ' + item?.Author_Name + ' (opens in a new tab)'">
                                            Read More
                                            <span class="visually-hidden">
                                                about {{item?.Publication_Title}} (opens in new tab)
                                            </span>
                                            <i class="fa-solid fa-arrow-right color-orange" aria-hidden="true"></i>
                                        </a>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div> <!-- row -->
                    <!-- <div class="row">
                        <div class="mb-1 pt-3" style="text-align: center !important;">
                            <div class="col-lg-12 col-sm-12">
                                <a class="main-btn">{{'View more' | translate}}</a>
                            </div>
                        </div>
                    </div> -->
                </div>
                <ng-template #elseblock>
                    <app-no-data></app-no-data>
                </ng-template>
            </div> <!-- about cont -->
        </div> <!-- row -->
    </div> <!-- container -->
</section>
<app-contact-us></app-contact-us>
