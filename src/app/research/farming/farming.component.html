<div *ngIf="farming_Data && farming_Data.length > 0;">
  
  <app-banner [banner_heading]="heading" [banner_img]="bannerImg"></app-banner>

  <div class="container-fluid">
    <div class="container">
      <div class="row">
        <section class="container-fluid Allnews mt-5">
          <div class="container">

            <!-- FIX 1: Label improved -->
            <label for="productSelect"
              style="padding-top: 10px; font-weight: 600; font-size: calc(14px * var(--font-scale));">
              Select a product
            </label>

            <div class="Allnews-search-section">

              <!-- FIX 2: Placeholder text -->
              <select id="productSelect"
                      class="Allnews-search-input"
                      [(ngModel)]="selectedProduct"
                      (change)="getProductdata()">

                <option value="">Select a product</option>

                <option *ngFor="let product of productList"
                        [value]="product.product_id">
                  {{ product.product_name }}
                </option>
              </select>

              <!-- FIX 3: Button semantic -->
              <button type="button"
                      class="Allnews-search-button"
                      (click)="refreshPage()">
                Refresh<span></span>
              </button>

            </div>
          </div>
        </section>
      </div>
    </div>
  </div>

  <section>
    <div class="container pt-3 pb-3">
      <div class="row">
        <div>
          <!-- FIX 4: Heading hierarchy -->
          <h2 class="section-title1">Products</h2>
        </div>
      </div>

      <div class="products" *ngFor="let item of farming_Data">
        <div class="row product mt-3 bg-light shadow"
             style="border: solid 1px; border-color: rgb(202, 200, 200);">

          <div class="col-md-8">
            <div class="text-container">

              <!-- FIX 5: h2 → h3 -->
              <h3>{{ item.product_name }}</h3>

              <p class="contents">{{ item.product_description }}</p>
            </div>
          </div>

          <div class="col-md-4">
            <div class="image-container">

              <!-- FIX 6: alt="" for decorative image -->
              <img [src]="item.product_image"
                   (error)="onErrorImage($event)"
                   alt=""
                   style="max-height: 258px; max-width: 300px;">
            </div>
          </div>

        </div>
      </div>

    </div>
  </section>
</div>


<!-- NOT FOUND -->
<div *ngIf="farming_Data==''"
     class="mt-5 pb-5"
     style="display: flex; align-items: center; justify-content: center;">

  <div class="not-found-container"
       style="border: solid 1px; border-color: rgb(202, 200, 200);">

    <div class="error-icon">
      <!-- FIX 7: better alt -->
      <img src="https://img.icons8.com/ios/452/error.png"
           alt="Error illustration">
    </div>

    <!-- FIX 8: heading hierarchy -->
    <h2 class="error-code">404</h2>

    <p class="error-message">Oops! Data not Found...</p>

    <a routerLink="/" class="home-link">
      Back to Home
    </a>

  </div>
</div>
